version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pos_db
    restart: always
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: pos_db
    ports:
      - "5433:5432"
    volumes:
      - pos_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - pos_redis_data:/data

volumes:
  pos_db_data:
  pos_redis_data:
